<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Geometry Dash: Stable Velvet 2.2</title>
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        html, body {
            position: fixed; width: 100%; height: 100%;
            overflow: hidden; background-color: #030307;
            display: flex; justify-content: center; align-items: center;
        }
        #gameWrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 850px; max-height: 400px;
            aspect-ratio: 850 / 400;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px rgba(0, 85, 255, 0.25);
            border: 3px solid #0055ff; border-radius: 6px;
            background-color: #000014;
        }
        #gameCanvas {
            width: 100%; height: 100%;
            display: block; position: relative;
        }
        #mainMenu {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #000014 0%, #030307 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #mainMenu.hidden {
            opacity: 0; transform: scale(1.05); pointer-events: none;
        }
        #mainMenu h1 {
            color: #00ff96; font-family: sans-serif; font-size: clamp(24px, 8vw, 42px);
            margin-bottom: 5px; text-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            letter-spacing: 1px; text-transform: uppercase;
        }
        #mainMenu .subtitle {
            color: #0055ff; font-family: Arial; font-size: clamp(10px, 3vw, 16px);
            margin-bottom: clamp(15px, 5vw, 40px); font-weight: bold; letter-spacing: 4px;
        }
        .menu-btn {
            padding: 12px 45px; font-size: clamp(16px, 4vw, 22px); font-weight: bold;
            color: #fff; background: linear-gradient(135deg, #0055ff, #00ffff);
            border: 2px solid #ffffff; border-radius: 30px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 85, 255, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
            font-family: sans-serif; margin-bottom: clamp(15px, 4vw, 25px);
        }
        .menu-btn:active { transform: scale(0.95); }
        .skin-selector {
            display: flex; align-items: center; gap: 15px; margin-bottom: clamp(15px, 4vw, 30px);
        }
        .skin-label { color: #fff; font-family: Arial; font-size: clamp(11px, 2.5vw, 14px); opacity: 0.8; }
        .skin-preview {
            width: clamp(25px, 6vw, 35px); height: clamp(25px, 6vw, 35px); background-color: #00ff96;
            border: 3px solid #000; box-shadow: 0 0 10px rgba(0, 255, 150, 0.5);
            cursor: pointer; transition: transform 0.2s;
        }
        #pauseBtn {
            position: absolute; top: 15px; right: 15px;
            width: clamp(40px, 10vw, 60px); height: clamp(40px, 10vw, 60px); border-radius: 50%;
            background: rgba(0, 85, 255, 0.4); border: 2px solid #00ffff;
            color: #fff; font-size: clamp(16px, 4vw, 24px); font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); z-index: 10;
        }
        #pauseOverlay, #gameOverOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 12, 0.8); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        #pauseOverlay.active, #gameOverOverlay.active { opacity: 1; pointer-events: auto; }
        #pauseOverlay h2 { color: #00ffff; font-family: sans-serif; font-size: clamp(24px, 6vw, 36px); margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); }
        #pauseOverlay p { color: #ffffff; font-family: Arial; font-size: clamp(10px, 2.5vw, 14px); opacity: 0.7; }
        .go-btn-container { display: flex; gap: 20px; margin-top: 20px; }
        .go-btn {
            padding: 10px 30px; font-size: clamp(14px, 3.5vw, 18px); font-weight: bold;
            color: #fff; border: 2px solid #fff; border-radius: 20px; cursor: pointer;
            font-family: sans-serif; transition: transform 0.1s;
        }
        .go-btn:active { transform: scale(0.95); }
        #retryBtn { background: linear-gradient(135deg, #00ff96, #00aa50); box-shadow: 0 0 15px rgba(0, 255, 150, 0.4); }
        #menuBtn { background: linear-gradient(135deg, #ff3366, #aa0033); box-shadow: 0 0 15px rgba(255, 51, 102, 0.4); }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="mainMenu">
            <h1>Stable Velvet</h1>
            <div class="subtitle">GEOMETRY DASH 2.2</div>
            <button class="menu-btn" id="startLevelBtn">PLAY</button>
            <div class="skin-selector">
                <span class="skin-label">CUBE COLOR:</span>
                <div class="skin-preview" id="skinBtn"></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="850" height="400"></canvas>
        <button id="pauseBtn">⏸</button>

        <!-- ОВЕРЛЕЙ ПАУЗЫ -->
        <div id="pauseOverlay">
            <h2>PAUSED</h2>
            <p>TAP PLAY BUTTON TO CONTINUE</p>
        </div>

        <!-- НОВЫЙ ОВЕРЛЕЙ ПРОИГРЫША -->
        <div id="gameOverOverlay">
            <div class="go-btn-container">
                <button class="go-btn" id="retryBtn">START AGAIN</button>
                <button class="go-btn" id="menuBtn">MENU</button>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.62;
const JUMP_FORCE = -11.5;
const FLOOR_Y = canvas.height - 80;
const LEVEL_DURATION = 100; 

let score = 0;
let timeElapsed = 0; 
let gameOver = false;
let levelWon = false;
let isTouching = false; 
let gameSpeed = 6.5;
let globalAnimTimer = 0;
let cameraY = 0;
let gameOverTimer = 0;
const GAME_OVER_DELAY = 120; 

let isPaused = false;
let isInMenu = true;

// Сброс и аннулирование попыток при обновлении страницы через sessionStorage
let totalAttempts = parseInt(sessionStorage.getItem("gd_attempts") || "1");
let playerColors = ["#00ff96", "#ff00ff", "#ffff00", "#00ffff", "#ff3366"];
let currentColorIdx = 0;

let obstacles = [];
let particles = [];
let warpLines = [];
let bgSymbols = []; 
let bgDecorations = []; 
let portal = null;
let lastPlatformStep = 0; 
let cascadeDirection = 1;

let winTimer = 0; 
const WIN_DELAY = 300; 
let winParticles = [];

const LEVEL_MAP = [
    {time: 1.5, type: "single_spike"}, {time: 2.8, type: "block_1"}, {time: 3.5, type: "single_spike"},
    {time: 4.8, type: "pit"}, {time: 6.2, type: "block_1"}, {time: 7.0, type: "single_spike"},
    {time: 8.5, type: "jaw_pit"}, {time: 9.8, type: "mini_step"},
    {time: 11.2, type: "top_block"}, {time: 12.2, type: "top_spike"}, {time: 14.0, type: "top_block"}, 
    {time: 16.0, type: "pit"}, {time: 17.2, type: "single_spike"},
    {time: 18.5, type: "block_1"}, {time: 19.5, type: "jaw_pit"},
    {time: 21.0, type: "mini_step"}, {time: 22.0, type: "top_block"},
    {time: 23.5, type: "single_spike"}, {time: 24.5, type: "single_spike"},
    {time: 26.0, type: "pit"}, {time: 27.5, type: "block_1"},
    {time: 29.0, type: "jaw_pit"}, {time: 30.2, type: "mini_step"}, {time: 32.0, type: "top_block"},
    {time: 34.0, type: "top_spike"}, {time: 35.5, type: "top_block"},
    {time: 37.0, type: "pit"}, {time: 38.2, type: "single_spike"},
    {time: 40.0, type: "block_1"}, {time: 41.2, type: "jaw_pit"},
    {time: 43.0, type: "mini_step"}, {time: 44.5, type: "top_block"}, {time: 47.0, type: "top_block"},
    {time: 49.5, type: "pit"}, {time: 51.0, type: "single_spike"},
    {time: 52.5, type: "block_1"}, {time: 54.0, type: "top_spike"},
    {time: 55.5, type: "jaw_pit"}, {time: 57.0, type: "mini_step"},
    {time: 58.5, type: "top_block"}, {time: 60.0, type: "pit"},
    {time: 62.0, type: "single_spike"}, {time: 63.5, type: "block_1"}, {time: 66.0, type: "top_block"},
    {time: 68.5, type: "jaw_pit"}, {time: 70.0, type: "mini_step"},
    {time: 71.5, type: "top_block"}, {time: 73.0, type: "pit"},
    {time: 74.8, type: "single_spike"}, {time: 76.0, type: "top_spike"},
    {time: 77.5, type: "block_1"}, {time: 79.0, type: "jaw_pit"}, {time: 82.0, type: "top_block"},
    {time: 84.5, type: "mini_step"}, {time: 86.0, type: "top_block"},
    {time: 87.5, type: "pit"}, {time: 89.0, type: "single_spike"},
    {time: 91.0, type: "block_1"}, {time: 92.5, type: "top_spike"},
    {time: 94.0, type: "jaw_pit"}, {time: 95.5, type: "single_spike"}
];
let currentMapIdx = 0;

const palettes = [
    { bg: {r: 2, g: 2, b: 24}, floor: {r: 0, g: 70, b: 220} },     
    { bg: {r: 20, g: 2, b: 28}, floor: {r: 200, g: 0, b: 100} },   
    { bg: {r: 2, g: 20, b: 12}, floor: {r: 0, g: 190, b: 90} },   
    { bg: {r: 20, g: 12, b: 2}, floor: {r: 220, g: 90, b: 0} },   
    { bg: {r: 12, g: 2, b: 24}, floor: {r: 130, g: 0, b: 220} }    
];

let currentPaletteIdx = 0;
let currentBgColor = { r: 2, g: 2, b: 24 };
let currentFloorColor = { r: 0, g: 70, b: 220 };
let audioCtx = null;
let musicInterval = null;
let mainMusicGain = null; // Узел для управления плавным затиханием
let beatCount = 0;

document.addEventListener("visibilitychange", () => {
    if (!audioCtx) return;
    if (document.hidden) audioCtx.suspend();
    else if (!gameOver && !isPaused && !isInMenu) audioCtx.resume();
});

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    mainMusicGain = audioCtx.createGain();
    mainMusicGain.gain.setValueAtTime(1, audioCtx.currentTime);
    mainMusicGain.connect(audioCtx.destination);
    startMusicLoop();
}

function startMusicLoop() {
    if (musicInterval) clearInterval(musicInterval);
    musicInterval = setInterval(() => {
        if (gameOver || isPaused || isInMenu || document.hidden) return;
        
        let progressFactor = timeElapsed / LEVEL_DURATION;
        let remainingTime = LEVEL_DURATION - timeElapsed;
        let isEnding = remainingTime <= 5; 

        const chords = [
            [110.00, 130.81, 164.81], 
            [87.31,  130.81, 174.61], 
            [130.81, 164.81, 196.00], 
            [98.00,  146.83, 196.00]  
        ];
        let currentChord = isEnding ? [130.81, 164.81, 196.00] : chords[Math.floor(beatCount / 8) % chords.length];
        
        if (beatCount % 32 === 0 && beatCount > 0 && !isEnding) {
            currentPaletteIdx = (currentPaletteIdx + 1) % palettes.length;
        }

        if (!isEnding) {
            let subOsc = audioCtx.createOscillator();
            let subGain = audioCtx.createGain();
            subOsc.type = 'sine';
            subOsc.frequency.setValueAtTime(currentChord[0] * 0.5, audioCtx.currentTime);
            subGain.gain.setValueAtTime(0, audioCtx.currentTime);
            subGain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.02);
            subGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.20);
            subOsc.connect(subGain); subGain.connect(mainMusicGain);
            subOsc.start(); subOsc.stop(audioCtx.currentTime + 0.22);
        }

        currentChord.forEach((freq, idx) => {
            let padOsc = audioCtx.createOscillator();
            let padGain = audioCtx.createGain();
            let panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
            
            padOsc.type = isEnding ? 'sawtooth' : 'triangle'; 
            let targetFreq = isEnding ? freq * 2 * (1 + (5 - remainingTime) * 0.1) : freq;
            
            padOsc.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
            padGain.gain.setValueAtTime(0, audioCtx.currentTime);
            
            if (isEnding) {
                let volume = 0.02 + ((5 - remainingTime) * 0.015);
                padGain.gain.linearRampToValueAtTime(Math.min(0.08, volume), audioCtx.currentTime + 0.1);
                padGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            } else {
                padGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.05);
                padGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.24);
            }
            
            if (panner) {
                panner.pan.setValueAtTime(idx === 0 ? -0.5 : (idx === 1 ? 0 : 0.5), audioCtx.currentTime);
                padOsc.connect(panner); panner.connect(padGain);
            } else {
                padOsc.connect(padGain);
            }
            padGain.connect(mainMusicGain);
            padOsc.start(); padOsc.stop(audioCtx.currentTime + (isEnding ? 0.45 : 0.25));
        });
        if (beatCount % 2 === 0 && !isEnding) {
            let kickOsc = audioCtx.createOscillator();
            let kickGain = audioCtx.createGain();
            kickOsc.type = 'sine';
            kickOsc.frequency.setValueAtTime(100, audioCtx.currentTime);
            kickOsc.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 0.08);
            kickGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            kickGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.09);
            kickOsc.connect(kickGain); kickGain.connect(mainMusicGain);
            kickOsc.start(); kickOsc.stop(audioCtx.currentTime + 0.1);
        }

        if (beatCount % 4 === 2 && !isEnding) {
            let clapOsc = audioCtx.createOscillator();
            let clapGain = audioCtx.createGain();
            clapOsc.type = 'triangle';
            clapOsc.frequency.setValueAtTime(800, audioCtx.currentTime);
            clapOsc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.07);
            clapGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            clapGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            clapOsc.connect(clapGain); clapGain.connect(mainMusicGain);
            clapOsc.start(); clapOsc.stop(audioCtx.currentTime + 0.08);
        }

        let leadOsc = audioCtx.createOscillator();
        let leadGain = audioCtx.createGain();
        leadOsc.type = isEnding ? 'sine' : 'triangle';
        
        let baseMelodyFreq = currentChord[beatCount % currentChord.length] * 2;
        if (isEnding) {
            baseMelodyFreq = currentChord[beatCount % currentChord.length] * 4;
        } else if (progressFactor > 0.66) {
            baseMelodyFreq = currentChord[(beatCount * 2) % currentChord.length] * 4;
        }
        
        leadOsc.frequency.setValueAtTime(baseMelodyFreq, audioCtx.currentTime);
        leadGain.gain.setValueAtTime(0, audioCtx.currentTime);
        leadGain.gain.linearRampToValueAtTime(isEnding ? 0.06 : 0.05, audioCtx.currentTime + 0.02);
        leadGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isEnding ? 0.18 : 0.12));
        leadOsc.connect(leadGain); leadGain.connect(mainMusicGain);
        leadOsc.start(); leadOsc.stop(audioCtx.currentTime + (isEnding ? 0.19 : 0.13));

        beatCount++;
    }, 220); 
}

function playJumpSound() {
    if (!audioCtx || document.hidden) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'sine'; 
    osc.frequency.setValueAtTime(260, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

function playExplosionSound() {
    if (!audioCtx || document.hidden) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
}

class WarpLine {
    constructor() {
        this.x = canvas.width + 50; 
        this.y = Math.random() * (FLOOR_Y - 20);
        this.length = Math.random() * 60 + 30; 
        this.speed = Math.random() * 3 + gameSpeed;
    }
    update() { this.x -= (gameOver || isPaused || isInMenu) ? 0 : this.speed; }
    draw() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)"; 
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.length, this.y); ctx.stroke();
    }
}
class BgSymbol {
    constructor() {
        const types = ["▲", "✕", "◆", "★"];
        this.type = types[Math.floor(Math.random() * types.length)];
        this.x = canvas.width + 50;
        this.y = Math.random() * (FLOOR_Y + 200) - 150; 
        this.size = Math.random() * 16 + 12;
        this.speed = (Math.random() * 1.5 + 1.0) * (gameSpeed * 0.3); 
        this.alpha = Math.random() * 0.12 + 0.05;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = Math.random() * 0.02 - 0.01;
    }
    update() {
        this.x -= (gameOver || isPaused || isInMenu) ? 0 : this.speed;
        this.rotation += (gameOver || isPaused || isInMenu) ? 0 : this.rotSpeed;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = "#ffffff";
        ctx.font = `${this.size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.fillText(this.type, 0, 0); ctx.restore();
    }
}

class BgDecoration {
    constructor() {
        this.x = canvas.width + 60;
        this.type = Math.random() > 0.5 ? "jaw" : "spike";
        this.size = Math.random() * 30 + 30;
        this.speed = gameSpeed * 0.5; 
        this.alpha = Math.random() * 0.15 + 0.08; 
        this.y = Math.random() > 0.5 ? 0 : FLOOR_Y; 
    }
    update() { this.x -= (gameOver || isPaused || isInMenu) ? 0 : this.speed; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.type === "jaw" ? "#ff0055" : "#ff3366";
        let ry = this.y; 
        if (this.type === "spike") {
            ctx.beginPath();
            if (this.y === 0) {
                ctx.moveTo(this.x, ry); ctx.lineTo(this.x + this.size, ry); ctx.lineTo(this.x + this.size/2, ry + this.size);
            } else {
                ctx.moveTo(this.x, ry); ctx.lineTo(this.x + this.size, ry); ctx.lineTo(this.x + this.size/2, ry - this.size);
            }
            ctx.closePath(); ctx.fill();
        } else {
            ctx.font = `${this.size}px Arial`; ctx.textAlign = "center";
            ctx.fillText("▼▼▼", this.x, this.y === 0 ? ry + this.size : ry);
        }
        ctx.restore();
    }
}
class Particle {
    constructor(x, y, color, speedX, speedY, size, isDebris = false) {
        this.x = x; this.y = y; this.color = color;
        this.speedX = speedX || (Math.random() * 5 - 2.5);
        this.speedY = speedY || (Math.random() * 5 - 2.5);
        this.size = size || Math.random() * 4 + 2;
        this.alpha = 1; 
        this.decay = Math.random() * 0.02 + 0.015;
        this.isDebris = isDebris; 
        this.rotation = Math.random() * Math.PI * 2;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        if (!this.isDebris) this.speedY += 0.05; 
        this.alpha -= this.decay; this.rotation += 0.05;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        if (this.isDebris) {
            ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
            ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        } else {
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        ctx.restore();
    }
}

const player = {
    x: 140, y: FLOOR_Y - 40, size: 40, velocityY: 0, isGrounded: true, angle: 0,
    jump() {
        if (this.isGrounded && !levelWon && !gameOver && !isInMenu) {
            this.velocityY = JUMP_FORCE; this.isGrounded = false;
            playJumpSound();
            for(let i=0; i<6; i++) particles.push(new Particle(this.x + this.size/2, this.y + this.size, playerColors[currentColorIdx]));
        }
    },
    update() {
        this.velocityY += GRAVITY; this.y += this.velocityY;
        let overPit = false;
        obstacles.forEach(obs => {
            if ((obs.type === "pit" || obs.type === "jaw_pit") && this.x + this.size - 8 > obs.x && this.x + 8 < obs.x + obs.width) overPit = true;
        });
        if (!overPit && this.y >= FLOOR_Y - this.size) {
            this.y = FLOOR_Y - this.size; this.velocityY = 0;
            if (!this.isGrounded) { 
                this.isGrounded = true; this.angle = Math.round(this.angle / 90) * 90; 
                for(let i=0; i<4; i++) particles.push(new Particle(this.x + this.size/2, FLOOR_Y, playerColors[currentColorIdx]));
                lastPlatformStep = 0; 
            }
        }
        if (this.y > FLOOR_Y + 120 && !gameOver) triggerExplosion(this.x + this.size/2, FLOOR_Y + 40);
        if (!this.isGrounded) this.angle += 7.2;
        if (this.isGrounded && Math.random() < 0.2 && !isInMenu) {
            particles.push(new Particle(this.x, FLOOR_Y - 4, playerColors[currentColorIdx], -Math.random()*3 - 2, -Math.random()*1.5));
        }
    },
    draw() {
        if (gameOver) return; 
        ctx.save(); ctx.translate(this.x + this.size / 2, this.y + this.size / 2); ctx.rotate((this.angle * Math.PI) / 180);
        ctx.shadowBlur = 12; ctx.shadowColor = playerColors[currentColorIdx]; ctx.fillStyle = playerColors[currentColorIdx]; ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.strokeRect(-this.size / 4, -this.size / 4, this.size / 2, this.size / 2); ctx.restore();
    }
};

function triggerExplosion(x, y) {
    if (gameOver) return;
    gameOver = true;
    
    // Мгновенная жесткая остановка музыки при столкновении
    if (musicInterval) clearInterval(musicInterval);
    if (audioCtx) audioCtx.suspend();
    playExplosionSound();
    
    // Кубик эффектно разлетается на яркие прямоугольные неоновые частицы
    for (let i = 0; i < 40; i++) {
        let sX = (Math.random() * 12 - 6);
        let sY = (Math.random() * 14 - 8);
        particles.push(new Particle(x, y, playerColors[currentColorIdx], sX, sY, Math.random() * 8 + 6, true));
    }
    
    // Переключаем интерфейс на экран проигравшего
    document.getElementById("gameOverOverlay").classList.add("active");
}
class FinishPortal {
    constructor() {
        this.x = canvas.width; this.y = -200; this.width = 120; this.height = FLOOR_Y + 200; this.pulse = 0;
    }
    update() {
        this.x -= (gameOver || levelWon) ? 0 : gameSpeed; this.pulse += 0.15;
    }
    draw() {
        let sizeMod = Math.sin(this.pulse) * 12; ctx.save();
        let gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y + this.height);
        gradient.addColorStop(0, "#ff00ff"); gradient.addColorStop(0.3, "#00ffff"); gradient.addColorStop(0.7, "#ffaa00"); gradient.addColorStop(1, "#ff0055");
        ctx.fillStyle = gradient; ctx.beginPath(); ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/2 + sizeMod, this.height/2, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/3.5, this.height/2 - 25, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
}

class Obstacle {
    constructor(type) {
        this.type = type; this.x = canvas.width;
        if (type === "single_spike") { this.width = 30; this.height = 36; this.y = FLOOR_Y - this.height; } 
        else if (type === "top_spike") { this.width = 30; this.height = 36; this.y = 0; } 
        else if (type === "block_1") { this.width = 40; this.height = 40; this.y = FLOOR_Y - this.height; } 
        else if (type === "top_block") { 
            this.width = 90; this.height = 25; lastPlatformStep += cascadeDirection;
            if (lastPlatformStep >= 2) { lastPlatformStep = 2; cascadeDirection = -1; }
            if (lastPlatformStep <= 0) { lastPlatformStep = 0; cascadeDirection = 1; }
            this.y = FLOOR_Y - (lastPlatformStep * 30 + 160); 
        } 
        else if (type === "pit") { this.width = 150; this.pitType = "gear"; }
        else if (type === "jaw_pit") { this.width = 160; this.pitType = "jaw"; }
        else if (type === "mini_step") { this.width = 32; this.height = 14; this.y = FLOOR_Y - 55; }
    }
    update() { if (!gameOver && !isPaused && !isInMenu) this.x -= gameSpeed; }
    draw() {
        ctx.save(); let rx = this.x;
        if (this.type === "single_spike") {
            ctx.fillStyle = "#2c2c38"; ctx.beginPath(); ctx.moveTo(rx, this.y + this.height); ctx.lineTo(rx + this.width, this.y + this.height); ctx.lineTo(rx + this.width / 2, this.y); ctx.closePath(); ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
        } else if (this.type === "top_spike") {
            ctx.fillStyle = "#2c2c38"; ctx.beginPath(); ctx.moveTo(rx, this.y); ctx.lineTo(rx + this.width, this.y); ctx.lineTo(rx + this.width / 2, this.y + this.height); ctx.closePath(); ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
        } else if (this.type === "block_1") {
            ctx.fillStyle = "#090912"; ctx.fillRect(rx, this.y, this.width, this.height);
            ctx.strokeStyle = `rgb(${currentFloorColor.r}, ${currentFloorColor.g}, ${currentFloorColor.b})`; ctx.lineWidth = 3; ctx.strokeRect(rx, this.y, this.width, this.height);
        } else if (this.type === "mini_step") {
            ctx.fillStyle = "#0d0d1f"; ctx.fillRect(rx, this.y, this.width, this.height);
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 2; ctx.strokeRect(rx, this.y, this.width, this.height);
        } else if (this.type === "top_block") {
            ctx.fillStyle = "#2c2c38"; ctx.beginPath(); ctx.moveTo(rx + this.width / 2 - 15, FLOOR_Y); ctx.lineTo(rx + this.width / 2 + 15, FLOOR_Y); ctx.lineTo(rx + this.width / 2, FLOOR_Y - 36); ctx.closePath(); ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
            ctx.save(); ctx.strokeStyle = `rgba(${currentFloorColor.r}, ${currentFloorColor.g}, ${currentFloorColor.b}, 0.6)`; ctx.lineWidth = 3;
            ctx.beginPath();
            for (let cx of [rx + 15, rx + this.width - 15]) { ctx.moveTo(cx, this.y); ctx.lineTo(cx, this.y - 400); }
            ctx.stroke(); ctx.restore();
            ctx.fillStyle = "#090912"; ctx.fillRect(rx, this.y, this.width, this.height);
            ctx.strokeStyle = `rgb(${currentFloorColor.r}, ${currentFloorColor.g}, ${currentFloorColor.b})`; ctx.lineWidth = 3; ctx.strokeRect(rx, this.y, this.width, this.height);
        } else if (this.type === "pit" || this.type === "jaw_pit") {
            ctx.fillStyle = "#000014"; ctx.fillRect(rx, FLOOR_Y, this.width, canvas.height - FLOOR_Y);
            if (this.pitType === "gear") {
                ctx.save(); ctx.translate(rx + this.width / 2, FLOOR_Y + 40); if (!gameOver && !isPaused && !isInMenu) ctx.rotate(globalAnimTimer * 1.5);
                ctx.fillStyle = "#ffaa00"; ctx.beginPath();
                for (let i = 0; i < 16; i++) { let angle = (i * Math.PI) / 8; let r = i % 2 === 0 ? 25 : 15; ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r); } ctx.closePath(); ctx.fill(); ctx.restore();
            } else if (this.pitType === "jaw") {
                let bite = Math.sin(globalAnimTimer * 2.5) * 8; ctx.fillStyle = "#ff0055";
                for(let i = 0; i < 4; i++) { let tx = rx + 8 + i * 40; ctx.beginPath(); ctx.moveTo(tx, FLOOR_Y + 25); ctx.lineTo(tx + 25, FLOOR_Y + 25); ctx.lineTo(tx + 12, FLOOR_Y + 2 - (gameOver || isPaused || isInMenu ? 0 : bite)); ctx.closePath(); ctx.fill(); }
            }
        }
        ctx.restore();
    }
    checkCollision(p) {
        if (gameOver || levelWon) return false;
        if (this.type === "pit" || this.type === "jaw_pit") {
            if (p.x + p.size > this.x + 8 && p.x < this.x + this.width - 8 && p.y + p.size > FLOOR_Y + 5) return true;
            return false;
        }
        if (this.type === "block_1" || this.type === "top_block" || this.type === "mini_step") {
            let insideX = p.x + p.size > this.x && p.x < this.x + this.width;
            let stepOnTop = p.y + p.size >= this.y && p.y + p.size <= this.y + 14 && p.velocityY >= 0;
            if (insideX && stepOnTop) { p.y = this.y - p.size; p.velocityY = 0; if (!p.isGrounded) { p.isGrounded = true; p.angle = Math.round(p.angle / 90) * 90; } return false; }
            let hitWall = p.x + p.size > this.x && p.x < this.x + this.width && p.y + p.size > this.y + 12 && p.y < this.y + this.height;
            if (hitWall && p.velocityY >= 0) return true;
            if (this.type === "top_block") { let spikeX = this.x + this.width / 2; if (p.x + p.size - 6 > spikeX - 15 && p.x + 6 < spikeX + 15 && p.y + p.size - 6 > FLOOR_Y - 36) return true; }
        }
        if (this.type === "single_spike" || this.type === "top_spike") { if (p.x + p.size - 6 > this.x && p.x + 6 < this.x + this.width && p.y + p.size - 6 > this.y && p.y + 6 < this.y + this.height) return true; }
        return false;
    }
}

// Прыжки и клики
window.addEventListener("pointerdown", (e) => {
    if (e.target.closest("#pauseBtn") || e.target.closest("#mainMenu") || e.target.closest("#gameOverOverlay")) return;
    initAudio();
    if (isInMenu) return;
    
    if (levelWon && winTimer >= WIN_DELAY) {
        restartGame();
    } else if (!isPaused && !levelWon && !gameOver) {
        isTouching = true;
        player.jump();
    }
});

window.addEventListener("pointerup", (e) => {
    if (e.target.closest("#pauseBtn") || e.target.closest("#mainMenu") || e.target.closest("#gameOverOverlay")) return;
    isTouching = false;
});

// События кнопок меню
document.getElementById("startLevelBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    initAudio();
    isInMenu = false;
    document.getElementById("mainMenu").classList.add("hidden");
    restartGame();
});

const skinBtn = document.getElementById("skinBtn");
skinBtn.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    currentColorIdx = (currentColorIdx + 1) % playerColors.length;
    skinBtn.style.backgroundColor = playerColors[currentColorIdx];
    skinBtn.style.boxShadow = `0 0 15px ${playerColors[currentColorIdx]}`;
});

// Кнопки нового экрана проигрыша
document.getElementById("retryBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    document.getElementById("gameOverOverlay").classList.remove("active");
    restartGame();
});

document.getElementById("menuBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    document.getElementById("gameOverOverlay").classList.remove("active");
    isInMenu = true;
    document.getElementById("mainMenu").classList.remove("hidden");
});

document.getElementById("pauseBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    if (gameOver || levelWon || isInMenu) return;
    initAudio();
    
    isPaused = !isPaused;
    const overlay = document.getElementById("pauseOverlay");
    
    if (isPaused) {
        document.getElementById("pauseBtn").innerText = "▶";
        if (audioCtx) audioCtx.suspend();
        overlay.classList.add("active");
    } else {
        document.getElementById("pauseBtn").innerText = "⏸";
        if (audioCtx) audioCtx.resume();
        overlay.classList.remove("active");
    }
});
function drawProgressBar() {
    let progress = Math.min(1, timeElapsed / LEVEL_DURATION); let barWidth = 320; let barHeight = 9; let barX = canvas.width / 2 - barWidth / 2; let barY = 22;
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(barX, barY, barWidth, barHeight);
    ctx.strokeStyle = "rgba(255, 255, 255, 0.15)"; ctx.lineWidth = 1.5; ctx.strokeRect(barX, barY, barWidth, barHeight);
    let fillWidth = barWidth * progress; let gradient = ctx.createLinearGradient(barX, barY, barX + fillWidth, barY);
    gradient.addColorStop(0, "#0055ff"); gradient.addColorStop(0.5, "#00ff96"); gradient.addColorStop(1, "#00ffff");
    ctx.fillStyle = gradient; ctx.fillRect(barX + 1, barY + 1, Math.max(0, fillWidth - 2), barHeight - 2);
    
    let isEnding = (LEVEL_DURATION - timeElapsed) <= 5 && !gameOver && !levelWon;
    let pulseWave = Math.sin((globalAnimTimer * (isEnding ? 5 : 2.5)) % Math.PI);
    let pulseScale = 1.0 + (pulseWave * 0.22); 
    let cubeX = barX + fillWidth; let cubeY = barY + barHeight / 2; let cubeSize = 12 * pulseScale;
    
    ctx.save(); ctx.translate(cubeX, cubeY); ctx.rotate(45 * Math.PI / 180);
    ctx.shadowBlur = 10 * pulseScale; ctx.shadowColor = playerColors[currentColorIdx]; ctx.fillStyle = playerColors[currentColorIdx];
    ctx.fillRect(-cubeSize / 2, -cubeSize / 2, cubeSize, cubeSize);
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5; ctx.strokeRect(-cubeSize / 2, -cubeSize / 2, cubeSize, cubeSize); ctx.restore();
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
    ctx.fillText(Math.floor(progress * 100) + "%", canvas.width / 2, barY + barHeight + 16);

    // Новое отображение попыток внутри уровня (в верхнем левом углу)
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px Arial"; ctx.textAlign = "left";
    ctx.fillText(`ATTEMPT ${totalAttempts}`, 20, 30);
}

function drawWinTextAnimated() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (winParticles.length === 0) {
        let text = "LEVEL COMPLETE!"; let startX = canvas.width / 2 - (text.length * 24) / 2;
        for (let i = 0; i < text.length; i++) {
            if (text[i] === " ") continue;
            for (let p = 0; p < 25; p++) {
                winParticles.push({
                    char: text[i], targetX: startX + i * 26 + Math.random() * 8 - 4, targetY: canvas.height / 2 - 10 + Math.random() * 12 - 6,
                    x: startX + i * 26 + Math.random() * 60 - 30, y: -50 - Math.random() * 100, vx: 0, vy: Math.random() * 3 + 4,
                    color: `hsl(${130 + Math.random() * 40}, 100%, 65%)`, size: Math.random() * 3 + 2, state: "falling"
                });
            }
        }
    }
    winParticles.forEach((p) => {
        if (p.state === "falling") { p.y += p.vy; if (p.y >= p.targetY) { p.y = p.targetY; p.state = "steady"; } }
        ctx.save(); ctx.fillStyle = p.color; ctx.shadowBlur = 12; ctx.shadowColor = p.color; ctx.font = `italic bold ${24 + p.size}px sans-serif`; ctx.fillText(p.char, p.x, p.y); ctx.restore();
    });
    ctx.fillStyle = "#ffffff"; ctx.font = "20px Arial"; ctx.textAlign = "center";
    ctx.fillText("Вы полностью прошли Stereo Madness 2.2!", canvas.width / 2, canvas.height / 2 + 50);
    ctx.fillStyle = "#ff00ff"; ctx.fillText("ТАПНИТЕ, ЧТОБЫ СЫГРАТЬ ЕЩЕ РАЗ", canvas.width / 2, canvas.height / 2 + 100); ctx.textAlign = "left";
}

function loop() {
    if (isInMenu) {
        ctx.fillStyle = "#000014";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = `rgb(${Math.floor(currentFloorColor.r*0.4)}, ${Math.floor(currentFloorColor.g*0.4)}, ${Math.floor(currentFloorColor.b*0.4)})`; 
        ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height + 200);
        ctx.fillStyle = `rgb(${Math.floor(currentFloorColor.r)}, ${Math.floor(currentFloorColor.g)}, ${Math.floor(currentFloorColor.b)})`; 
        ctx.fillRect(0, FLOOR_Y, canvas.width, 4);
        player.draw();
        requestAnimationFrame(loop);
        return;
    }

    if (!gameOver && !isPaused) { 
        timeElapsed += 1 / 60; 
        globalAnimTimer += 0.05; 
        if (gameOverTimer < GAME_OVER_DELAY) gameOverTimer = 0; 
        if (levelWon) winTimer++;
    } else if (gameOver) { 
        gameOverTimer++; 
    }

    let progressFactor = timeElapsed / LEVEL_DURATION; 
    let remainingTime = LEVEL_DURATION - timeElapsed;
    let isEnding = remainingTime <= 5 && !gameOver && winTimer < WIN_DELAY; 

    let targetBg = palettes[currentPaletteIdx].bg; 
    let targetFloor = palettes[currentPaletteIdx].floor; 
    if (isEnding) {
        let flashIntensity = Math.min(1, (5 - remainingTime) / 5); 
        targetBg = {
            r: Math.floor(2 + (230 - 2) * flashIntensity),
            g: Math.floor(2 + (235 - 2) * flashIntensity),
            b: Math.floor(24 + (255 - 24) * flashIntensity)
        };
    }

    let brightnessMultiplier = isTouching ? 1.4 : 1.0;

    currentBgColor.r += (targetBg.r * brightnessMultiplier - currentBgColor.r) * 0.05; 
    currentBgColor.g += (targetBg.g * brightnessMultiplier - currentBgColor.g) * 0.05;
    currentBgColor.b += (targetBg.b * brightnessMultiplier - currentBgColor.b) * 0.05;
    
    currentFloorColor.r += (targetFloor.r - currentFloorColor.r) * 0.05;
    currentFloorColor.g += (targetFloor.g - currentFloorColor.g) * 0.05;
    currentFloorColor.b += (targetFloor.b - currentFloorColor.b) * 0.05;

    ctx.save();
    if (isEnding) {
        let shakePower = 1.5 + ((5 - remainingTime) * 1.8); 
        let offsetX = (Math.random() * 2 - 1) * shakePower;
        let offsetY = (Math.random() * 2 - 1) * shakePower;
        ctx.translate(offsetX, offsetY);
    }

    ctx.fillStyle = `rgb(${Math.min(255, Math.floor(currentBgColor.r))}, ${Math.min(255, Math.floor(currentBgColor.g))}, ${Math.min(255, Math.floor(currentBgColor.b))})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (isTouching && !isPaused && !levelWon) player.jump();
    if (!gameOver && !isPaused) player.update();
    
    if (Math.random() < 0.1 && !isPaused) warpLines.push(new WarpLine());
    warpLines.forEach((wl, idx) => { if(!isPaused) wl.update(); wl.draw(); if (wl.x < -100) warpLines.splice(idx, 1); });
    if (Math.random() < 0.03 && bgSymbols.length < 15 && !isPaused) bgSymbols.push(new BgSymbol());
    bgSymbols.forEach((sym, idx) => { if(!isPaused) sym.update(); sym.draw(); if (sym.x < -50) bgSymbols.splice(idx, 1); });
    if (Math.random() < 0.02 && bgDecorations.length < 10 && !isPaused) bgDecorations.push(new BgDecoration());
    bgDecorations.forEach((dec, idx) => { if(!isPaused) dec.update(); dec.draw(); if (dec.x < -60) bgDecorations.splice(idx, 1); });
    
    if (LEVEL_DURATION - timeElapsed <= 3 && !portal && !gameOver) { portal = new FinishPortal(); }
    
    ctx.fillStyle = `rgb(${Math.floor(currentFloorColor.r*0.4)}, ${Math.floor(currentFloorColor.g*0.4)}, ${Math.floor(currentFloorColor.b*0.4)})`; 
    ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height + 200);
    ctx.fillStyle = `rgb(${Math.floor(currentFloorColor.r)}, ${Math.floor(currentFloorColor.g)}, ${Math.floor(currentFloorColor.b)})`; 
    ctx.fillRect(0, FLOOR_Y, canvas.width, 4);
    
    if (!gameOver && currentMapIdx < LEVEL_MAP.length && !isPaused && !levelWon) { 
        let nextObstacle = LEVEL_MAP[currentMapIdx]; 
        if (timeElapsed >= nextObstacle.time) { obstacles.push(new Obstacle(nextObstacle.type)); currentMapIdx++; } 
    }
    
    for (let i = obstacles.length - 1; i >= 0; i--) {
        if(!isPaused) obstacles[i].update(); 
        obstacles[i].draw();
        if (obstacles[i].checkCollision(player)) triggerExplosion(player.x + player.size/2, player.y + player.size/2);
        if (obstacles[i].x + obstacles[i].width < 0) { obstacles.splice(i, 1); score++; }
    }
    
    if (portal) {
        if(!isPaused) portal.update(); 
        portal.draw();
        if (player.x + player.size > portal.x + portal.width / 2 && !levelWon) {
            levelWon = true;
            gameSpeed = 0; 
            
            // После надписи LEVEL COMPLETE музыка звучит ещё секунду и плавно затухает
            if (mainMusicGain && audioCtx) {
                mainMusicGain.gain.setValueAtTime(1, audioCtx.currentTime);
                mainMusicGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.0);
                setTimeout(() => {
                    if (musicInterval) clearInterval(musicInterval);
                }, 1000);
            }

            for (let i = 0; i < 90; i++) { 
                let speedX = Math.random() * 6 + 4; 
                let speedY = -(Math.random() * 8 + 3); 
                particles.push(new Particle(player.x + player.size / 2, player.y + player.size / 2, Math.random() > 0.5 ? "#00ff96" : "#00ffff", speedX, speedY, Math.random() * 6 + 4, true)); 
            }
        }
    }
    
    for (let i = particles.length - 1; i >= 0; i--) { if(!isPaused) particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
    
    if (!levelWon) player.draw(); 
    drawProgressBar(); 

    ctx.restore(); 
    
    if (gameOver && gameOverTimer >= GAME_OVER_DELAY) { /* Окно управляется кнопками */ } 
    else if (levelWon && winTimer >= WIN_DELAY) { drawWinTextAnimated(); } 
    else { requestAnimationFrame(loop); }
}

function restartGame() {
    if (isInMenu) {
        document.getElementById("pauseBtn").style.display = "none";
        return;
    }
    document.getElementById("pauseBtn").style.display = "flex";

    score = 0; timeElapsed = 0; gameOver = false; levelWon = false; currentMapIdx = 0; currentPaletteIdx = 0; gameOverTimer = 0; isPaused = false;
    winTimer = 0; gameSpeed = 6.5; 
    obstacles = []; particles = []; warpLines = []; bgSymbols = []; bgDecorations = []; portal = null; lastPlatformStep = 0; cascadeDirection = 1;
    winParticles = []; 
    player.y = FLOOR_Y - player.size; player.velocityY = 0; player.isGrounded = true; player.angle = 0;
    document.getElementById("pauseBtn").innerText = "⏸";
    
    if (audioCtx) { 
        // Если контекст был приостановлен из-за взрыва кубика, возобновляем его
        if (audioCtx.state === "suspended") audioCtx.resume();
        
        mainMusicGain.gain.setValueAtTime(1, audioCtx.currentTime);
        beatCount = 0; 
        startMusicLoop(); 
        totalAttempts++;
        sessionStorage.setItem("gd_attempts", totalAttempts);
    }
    requestAnimationFrame(loop);
}

if (isInMenu) {
    document.getElementById("pauseBtn").style.display = "none";
    requestAnimationFrame(loop);
}
</script>
